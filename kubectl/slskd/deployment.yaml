---
apiVersion: apps/v1
kind: Deployment
metadata:
    name: gluetun2
    labels:
        app: gluetun2
spec:
    strategy:
        type: Recreate
    selector:
        matchLabels:
            app: gluetun2
    template:
        metadata:
            labels:
                app: gluetun2
        spec:
            initContainers:
                - name: gluetun2
                  restartPolicy: Always
                  image: qmcgaw/gluetun
                  imagePullPolicy: Always
                  lifecycle:
                    postStart:
                      exec:
                        command: ["/bin/sh", "-c", "(ip rule del table 51820; ip -6 rule del table 51820) || true"]
                  securityContext:
                      capabilities:
                          add:
                              - 'NET_ADMIN'
                  envFrom:
                    - secretRef:
                        name: gluetun2-secrets
                  volumeMounts:
                    - mountPath: /app/
                      name: nfs
                      subPath: applications/slskd/volumes/config/
                  livenessProbe:
                    exec:
                      command: ["/bin/sh", "-c", "wget -qO- http://127.0.0.1:9999 || exit 1"]
                    initialDelaySeconds: 60
                    periodSeconds: 60
                    timeoutSeconds: 5
                - name: curlpodtest
                  image: alpine/curl
                  ports:
                    - containerPort: 80
                      hostPort: 87
                  command: ['/bin/sh', '-c']
                  args:
                      - &check-ip |
                          IP=$(nslookup 123.joeberry.org | awk '/^Address: / { print $2 }')
                          EXPECTED_IP=$(curl checkip.amazonaws.com)
                          if [ "$IP" != "$EXPECTED_IP" ]; then
                            echo "IP is different from $EXPECTED_IP. Current IP is $IP."
                          else
                            echo "IP is $EXPECTED_IP. Exiting..."
                            exit 1
                          fi
            containers:
                # Run whatever you want to ensure is going out the tunnel here
                - name: slskd
                  image: slskd/slskd
                  resources:
                    requests:
                      memory: "1Gi"
                      cpu: "100m"
                    limits:
                      memory: "2Gi"
                      cpu: "1000m"
                  envFrom:
                    - secretRef:
                        name: gluetun2-secrets
                  volumeMounts:
                    - mountPath: /app/slskd.yml
                      name: nfs
                      subPath: applications/slskd/volumes/config/slskd.yml
                    - mountPath: /downloads
                      name: nfs
                      subPath: applications/qbittorrent-nox/volumes/downloads/music
            volumes:
              - name: nfs
                persistentVolumeClaim:
                  claimName: truenas-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: gluetun2
  annotations:
    metallb.io/address-pool: internal-pool
    metallb.io/allow-shared-ip: "shared-ip"
spec:
  type: LoadBalancer
  selector:
    app: gluetun2
  ports:
    - name: manage-http
      port: 5030
      targetPort: 5030
    - name: manage-https
      port: 5031
      targetPort: 5031
    - name: portfwd
      port: 50300
      targetPort: 50300
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slskd-ingress
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-ipallowlist-internal@kubernetescrd
    traefik.ingress.kubernetes.io/router.tls.certresolver: myresolver
spec:
  tls:
    - hosts:
      - slskd.joeberry.org
  rules:
  - host: slskd.joeberry.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gluetun2
            port:
              number: 5030
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: slskd-ingress-http
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: kube-system-ipallowlist-internal@kubernetescrd, kube-system-redirect-to-https@kubernetescrd
spec:
  rules:
  - host: slskd.joeberry.org
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: gluetun2
            port:
              number: 5030              